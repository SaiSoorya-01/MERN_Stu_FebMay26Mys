<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Introduction</title>
    <!-- React 18 CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

    <!--ReactDOM 18 CDN-->
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for JSX convertion in browser -->
    <script crossorigin src="https://unpkg.com/@Babel/standalone/babel.min.js"></script>
 
</head>
<body>
    <!-- Root container where React injects UI -->
    <div id="root"></div>
    <script type="text/babel">
        // App component
        // A component is a reuseable UI block.react apps are built using components
        function App(){
            return(
                <div>
                    <h1>React Introduction</h1>    
                    <p>React simplifies UI creation through reuseable components.</p>
                </div>
            );
        }

        // Rendering to DOM
        ReactDOM
        .createRoot(document.getElementById("root"))
        .render(<App />);
    </script>
</body>
</html>
